services:
  # ── Frontend (Nginx + Uni-app H5) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alpha-frontend
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Nginx envsubst 会将模板中的 ${NGINX_API_KEY} 替换为实际值
      NGINX_API_KEY: ${NEWS_API_KEY}
      # 只替换 NGINX_ 前缀的变量，保留 Nginx 原生 $host/$uri 等
      NGINX_ENVSUBST_FILTER: NGINX_
    volumes:
      # Mount SSL certs and Nginx prod config (as template)
      - ./deploy/nginx/conf.d:/etc/nginx/templates:ro
      - certbot_conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    logging: &default-logging
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
        tag: "{{.Name}}"
        labels: "service"
    labels:
      service: frontend

  # ── FastAPI Backend ──
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alpha-web
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - /data/alphareader/ema_snapshots:/data/ema_snapshots:rw
      - /data/alphareader/watchlists:/data/watchlists:rw
    labels:
      service: web
    # No ports exposed — accessed only via Nginx reverse proxy

  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: alpha-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    labels:
      service: db
    # No ports exposed — accessed only within Docker network

  # ── Redis ──
  cache:
    image: redis:7-alpine
    container_name: alpha-cache
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    logging: *default-logging
    labels:
      service: cache
    # No ports exposed — accessed only within Docker network

volumes:
  pgdata:
  redisdata:
  certbot_conf:
    external: true
    name: alphareader_certbot_conf
  certbot_www:
    external: true
    name: alphareader_certbot_www
