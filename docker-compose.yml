services:
  # ── Frontend (Nginx + Uni-app H5) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: alpha-frontend
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

  # ── FastAPI Backend ──
  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: alpha-web
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ──
  db:
    image: postgres:16-alpine
    container_name: alpha-db
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis ──
  cache:
    image: redis:7-alpine
    container_name: alpha-cache
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
