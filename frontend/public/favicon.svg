<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Open book shape -->
  <path d="M12 46 V22 Q12 18 16 18 H28 Q32 18 32 22 Q32 18 36 18 H48 Q52 18 52 22 V46"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Book spine -->
  <line x1="32" y1="22" x2="32" y2="46" stroke="white" stroke-width="2" opacity="0.6"/>
  <!-- Dollar sign on the right page -->
  <text x="42" y="39" font-family="Arial,sans-serif" font-size="18" font-weight="bold"
        fill="#FFD54F" text-anchor="middle">$</text>
  <!-- Text lines on left page -->
  <line x1="17" y1="26" x2="27" y2="26" stroke="white" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="17" y1="31" x2="25" y2="31" stroke="white" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
  <line x1="17" y1="36" x2="26" y2="36" stroke="white" stroke-width="1.5" opacity="0.7" stroke-linecap="round"/>
</svg>
